# render.yaml – Render.com deployment config for the Flask backend
# Commit this file to your GitHub repo, then connect the repo on render.com

services:
  - type: web
    name: snake-arcade-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DB_PATH
        value: /opt/render/project/src/snake_arcade.db
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src
      sizeGB: 1
